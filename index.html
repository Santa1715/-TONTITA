<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Reinita</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Dancing Script', cursive;
            cursor: crosshair;
            background: #0c0214;
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .aurora-layer {
            position: absolute;
            width: 200%;
            height: 60%;
            top: -20%;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.18;
            animation: auroraFloat 8s ease-in-out infinite;
        }

        @media (min-width: 768px) {
            .aurora-layer {
                filter: blur(60px);
            }
        }

        .aurora-layer:nth-child(1) {
            background: radial-gradient(ellipse, #ff007f 0%, #b300b3 40%, transparent 70%);
            left: -30%;
            animation-duration: 9s;
        }

        .aurora-layer:nth-child(2) {
            background: radial-gradient(ellipse, #ff66cc 0%, #9900cc 40%, transparent 70%);
            left: 10%;
            top: -10%;
            animation-delay: -3s;
            animation-duration: 11s;
        }

        .aurora-layer:nth-child(3) {
            background: radial-gradient(ellipse, #ff3399 0%, #660099 40%, transparent 70%);
            left: 50%;
            animation-delay: -6s;
            animation-duration: 7s;
        }

        .aurora-layer:nth-child(4) {
            background: radial-gradient(ellipse, #ff99cc 0%, #cc0066 40%, transparent 70%);
            left: -10%;
            top: 30%;
            animation-delay: -2s;
            animation-duration: 13s;
            opacity: 0.12;
        }

        @keyframes auroraFloat {

            0%,
            100% {
                transform: translateY(0) scaleX(1);
                opacity: 0.18;
            }

            33% {
                transform: translateY(15px) scaleX(1.1);
                opacity: 0.25;
            }

            66% {
                transform: translateY(-10px) scaleX(0.9);
                opacity: 0.15;
            }
        }

        #canvasFuegos {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            bottom: -50px;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.8);
                opacity: 0;
            }

            10% {
                opacity: 0.7;
            }

            90% {
                opacity: 0.4;
            }

            100% {
                transform: translateY(-110vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        .mensaje-central {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            animation: mensajePulse 4s ease-in-out infinite;
        }

        .mensaje-central h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2rem, 5vw, 4rem);
            color: #fff;
            text-shadow: 0 0 10px #ff007f, 0 0 25px #ff007f, 0 0 50px #ff007f, 0 0 80px #b300b3;
            letter-spacing: 3px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        .mensaje-central p {
            font-family: 'Playfair Display', serif;
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            color: #ffb3d9;
            margin-top: 10px;
            font-style: italic;
            text-shadow: 0 0 15px #ff007f;
            opacity: 0.85;
        }

        .heart-icon-big {
            font-size: clamp(3rem, 8vw, 6rem);
            display: block;
            animation: heartBeat 1.2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px #ff007f) drop-shadow(0 0 40px #ff007f);
        }

        @keyframes heartBeat {

            0%,
            100% {
                transform: scale(1);
            }

            14% {
                transform: scale(1.2);
            }

            28% {
                transform: scale(1);
            }

            42% {
                transform: scale(1.15);
            }

            56% {
                transform: scale(1);
            }
        }

        @keyframes titleGlow {
            0% {
                text-shadow: 0 0 10px #ff007f, 0 0 25px #ff007f, 0 0 50px #ff007f;
            }

            100% {
                text-shadow: 0 0 20px #ff66cc, 0 0 40px #ff66cc, 0 0 80px #cc00ff, 0 0 120px #cc00ff;
            }
        }

        @keyframes mensajePulse {

            0%,
            100% {
                opacity: 0.9;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.03);
            }
        }

        .texto-corazon {
            position: absolute;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.4rem, 5vw, 2.5rem);
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            line-height: 1.4;
            pointer-events: none;
            z-index: 8;
            transform: translate(-50%, -50%) scale(0);
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #b300b3;
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 127, 0.4);
            border-radius: 20px;
            padding: 10px 18px;
            white-space: normal;
            max-width: 85vw;
            width: max-content;
        }

        .texto-corazon.mostrar {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .texto-corazon span {
            display: block;
            font-size: clamp(0.85rem, 3vw, 1.3rem);
            font-style: italic;
            font-family: 'Playfair Display', serif;
            color: #ffb3d9;
            margin-top: 4px;
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 5;
            animation: sparkleAnim 2s ease-out forwards;
        }

        @keyframes sparkleAnim {
            0% {
                opacity: 1;
                transform: scale(0) rotate(0deg);
            }

            50% {
                opacity: 1;
                transform: scale(1.5) rotate(180deg);
            }

            100% {
                opacity: 0;
                transform: scale(0) rotate(360deg);
            }
        }

        .love-message {
            position: fixed;
            pointer-events: none;
            z-index: 6;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1rem, 2.5vw, 1.6rem);
            color: #ffb3d9;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            animation: loveMessageFloat 5s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes loveMessageFloat {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5);
            }

            15% {
                opacity: 1;
                transform: translateY(-20px) scale(1);
            }

            80% {
                opacity: 1;
                transform: translateY(-80px) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-130px) scale(0.8);
            }
        }

        .instruccion {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 179, 217, 0.7);
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
            font-style: italic;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            animation: instruccionBlink 3s ease-in-out infinite;
            text-shadow: 0 0 10px #ff007f;
        }

        @keyframes instruccionBlink {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .ring-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            pointer-events: none;
        }

        .ring {
            border-radius: 50%;
            border: 1px solid rgba(255, 0, 127, 0.15);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: ringRotate 20s linear infinite;
        }

        /* Mobile ring sizes */
        .ring:nth-child(1) {
            width: min(250px, 65vw);
            height: min(250px, 65vw);
            animation-duration: 15s;
        }

        .ring:nth-child(2) {
            width: min(350px, 85vw);
            height: min(350px, 85vw);
            animation-duration: 20s;
            animation-direction: reverse;
            border-color: rgba(255, 102, 204, 0.1);
        }

        .ring:nth-child(3) {
            width: min(450px, 98vw);
            height: min(450px, 98vw);
            animation-duration: 28s;
            border-color: rgba(179, 0, 179, 0.08);
        }

        .ring-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff007f;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 8px #ff007f, 0 0 16px #ff007f;
        }

        @keyframes ringRotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .corner-heart {
            position: fixed;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(0 0 10px #ff007f);
            animation: cornerPulse 2s ease-in-out infinite;
        }

        .corner-heart.tl {
            top: 12px;
            left: 12px;
            animation-delay: 0s;
        }

        .corner-heart.tr {
            top: 12px;
            right: 12px;
            animation-delay: 0.5s;
        }

        .corner-heart.bl {
            bottom: 60px;
            left: 12px;
            animation-delay: 1s;
        }

        .corner-heart.br {
            bottom: 60px;
            right: 12px;
            animation-delay: 1.5s;
        }

        @keyframes cornerPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.3);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="aurora">
        <div class="aurora-layer"></div>
        <div class="aurora-layer"></div>
        <div class="aurora-layer"></div>
        <div class="aurora-layer"></div>
    </div>
    <div class="ring-container">
        <div class="ring">
            <div class="ring-dot"></div>
        </div>
        <div class="ring">
            <div class="ring-dot"></div>
        </div>
        <div class="ring">
            <div class="ring-dot"></div>
        </div>
    </div>
    <div class="floating-hearts" id="floatingHeartsContainer"></div>
    <div class="mensaje-central">
        <span class="heart-icon-big">&#x1F496;</span>
        <h1>Para Mi Reinita</h1>
        <p>TE AMO TONTITA&#x2728;</p>
    </div>
    <canvas id="canvasFuegos"></canvas>
    <div id="textoContainer" class="texto-corazon">
        <div id="textoTitulo">Te Amo &#x1F496;</div>
        <span id="textoSub">Con todo mi corazon</span>
    </div>
    <div class="corner-heart tl">&#x1F497;</div>
    <div class="corner-heart tr">&#x1F495;</div>
    <div class="corner-heart bl">&#x1F49D;</div>
    <div class="corner-heart br">&#x1F493;</div>
    <div class="instruccion">&#x1F4AB; Haz clic para llenar el cielo de amor &#x1F4AB;</div>
    <script>
        const canvas = document.getElementById('canvasFuegos');
        const ctx = canvas.getContext('2d');
        const textoContainer = document.getElementById('textoContainer');
        const textoTitulo = document.getElementById('textoTitulo');
        const textoSub = document.getElementById('textoSub');

        function ajustarCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        ajustarCanvas();
        window.addEventListener('resize', ajustarCanvas);

        // ===== MOTOR DE SONIDO (Web Audio API) =====
        let audioCtx = null;

        function iniciarAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Silbido del cohete al lanzar (tono que sube rápido)
        function sonarLanzamiento() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;

            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(900, now + 0.5);

            gain.gain.setValueAtTime(0.0, now);
            gain.gain.linearRampToValueAtTime(0.18, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.6);
        }

        // Explosión: boom grave + chispas agudas
        function sonarExplosion() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            // --- BOOM grave (ruido filtrado) ---
            const bufLen = audioCtx.sampleRate * 0.6;
            const buffer = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(200, now);
            filter.frequency.exponentialRampToValueAtTime(40, now + 0.5);

            const gainBoom = audioCtx.createGain();
            gainBoom.gain.setValueAtTime(0.8, now);
            gainBoom.gain.exponentialRampToValueAtTime(0.001, now + 0.6);

            source.connect(filter);
            filter.connect(gainBoom);
            gainBoom.connect(audioCtx.destination);
            source.start(now);
            source.stop(now + 0.65);

            // --- CHISPAS agudas (ruido filtrado alto) ---
            const bufChispa = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.8, audioCtx.sampleRate);
            const dataC = bufChispa.getChannelData(0);
            for (let i = 0; i < dataC.length; i++) dataC[i] = (Math.random() * 2 - 1);

            const srcChispa = audioCtx.createBufferSource();
            srcChispa.buffer = bufChispa;

            const filtChispa = audioCtx.createBiquadFilter();
            filtChispa.type = 'bandpass';
            filtChispa.frequency.setValueAtTime(3000, now);
            filtChispa.Q.value = 0.5;

            const gainChispa = audioCtx.createGain();
            gainChispa.gain.setValueAtTime(0.25, now);
            gainChispa.gain.exponentialRampToValueAtTime(0.001, now + 0.8);

            srcChispa.connect(filtChispa);
            filtChispa.connect(gainChispa);
            gainChispa.connect(audioCtx.destination);
            srcChispa.start(now);
            srcChispa.stop(now + 0.85);
        }


        const mensajes = [
            { t: "Te Amo \u{1F496}", s: "Con todo mi corazon" },
            { t: "Mi Reinita \u{1F451}", s: "La mas hermosa del mundo" },
            { t: "Eres Mi Todo \u2728", s: "Sin ti no hay vida" },
            { t: "Te Adoro \u{1F339}", s: "Cada dia mas y mas" },
            { t: "Mi Cielo \u{1F31C}", s: "Llenas mi universo" },
            { t: "Eres Perfecta \u{1F48E}", s: "En cada detalle" },
            { t: "Mi Amor \u{1F495}", s: "Para siempre y mas" },
            { t: "Contigo \u{1F98B}", s: "Todo es maravilloso" },
            { t: "Mi Luz \u{1F31F}", s: "Iluminas mi mundo" },
            { t: "Tu y Yo \u{1F491}", s: "Para toda la vida" },
        ];
        let msgIdx = 0;

        const estrellas = [];
        for (let i = 0; i < 200; i++) {
            estrellas.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, r: Math.random() * 1.5 + 0.2, fase: Math.random() * Math.PI * 2, vel: Math.random() * 0.02 + 0.005 });
        }

        class EstrellaFugaz {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height * 0.5;
                this.len = Math.random() * 120 + 60;
                this.speed = Math.random() * 8 + 4;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
                this.vida = 0; this.maxVida = this.len / this.speed;
                this.alpha = 0; this.delay = Math.random() * 300;
            }
            update() {
                if (this.delay > 0) { this.delay--; return; }
                this.vida++;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.alpha = Math.sin((this.vida / this.maxVida) * Math.PI);
                if (this.vida >= this.maxVida) this.reset();
            }
            draw() {
                if (this.delay > 0 || this.alpha <= 0) return;
                const tx = this.x - Math.cos(this.angle) * this.len * this.alpha;
                const ty = this.y - Math.sin(this.angle) * this.len * this.alpha;
                const g = ctx.createLinearGradient(tx, ty, this.x, this.y);
                g.addColorStop(0, 'rgba(255,255,255,0)');
                g.addColorStop(1, 'rgba(255,200,230,' + this.alpha + ')');
                ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = g; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,200,230,' + this.alpha + ')';
                ctx.shadowBlur = 10; ctx.shadowColor = '#ff66cc'; ctx.fill(); ctx.shadowBlur = 0;
            }
        }
        const fugaces = [];
        for (let i = 0; i < 5; i++) fugaces.push(new EstrellaFugaz());

        function corazonPuntos(s) {
            const p = [];
            for (let t = 0; t < Math.PI * 2; t += 0.04) {
                p.push({ x: 16 * Math.pow(Math.sin(t), 3) * s, y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * s });
            }
            return p;
        }

        let cohetes = [], particulas = [];

        class Cohete {
            constructor(sx, sy, tx, ty, silent = false) {
                this.x = sx; this.y = sy;
                this.tx = tx; this.ty = ty;
                const dx = tx - sx, dy = ty - sy;
                const d = Math.sqrt(dx * dx + dy * dy);
                const sp = 14;
                this.vx = dx / d * sp; this.vy = dy / d * sp;
                this.dead = false; this.trail = []; this.silent = silent;
                if (!silent) sonarLanzamiento(); // 🚀 silbido al lanzar
            }
            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 14) this.trail.shift();
                this.x += this.vx; this.y += this.vy;
                if ((this.vy < 0 && this.y <= this.ty) || (this.vy > 0 && this.y >= this.ty)) {
                    this.dead = true;
                    if (!this.silent) sonarExplosion(); // 💥 boom solo si no es automático
                    explotar(this.tx, this.ty);
                }
            }
            draw() {
                for (let i = 0; i < this.trail.length; i++) {
                    const a = i / this.trail.length;
                    ctx.beginPath(); ctx.arc(this.trail[i].x, this.trail[i].y, 2 * a, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,102,204,' + (a * 0.6) + ')'; ctx.fill();
                }
                ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#fffbfa'; ctx.shadowBlur = 20; ctx.shadowColor = '#ff007f'; ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, vx, vy, color, orb) {
                this.x = x; this.y = y;
                this.vx = vx + (Math.random() - .5) * 2;
                this.vy = vy + (Math.random() - .5) * 2;
                this.color = color; this.alpha = 1; this.orb = orb;
                this.g = orb ? 0.005 : 0.025;
                this.f = orb ? 0.99 : 0.97;
                this.sz = orb ? Math.random() * 3 + 2 : Math.random() * 3 + 1;
                this.fade = orb ? 0.008 : 0.014;
            }
            update() { this.vx *= this.f; this.vy *= this.f; this.vy += this.g; this.x += this.vx; this.y += this.vy; this.alpha -= this.fade; }
            draw() {
                ctx.save(); ctx.globalAlpha = Math.max(0, this.alpha);
                if (this.orb) {
                    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.sz * 2);
                    g.addColorStop(0, 'white'); g.addColorStop(0.5, this.color); g.addColorStop(1, 'transparent');
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.sz * 2, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
                } else {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.sz, 0, Math.PI * 2);
                    ctx.fillStyle = this.color; ctx.shadowBlur = 12; ctx.shadowColor = this.color; ctx.fill();
                }
                ctx.restore();
            }
        }

        const colores = ['#ff007f', '#ff66cc', '#b300b3', '#ffb3d9', '#ffffff', '#ff3399', '#ff99cc', '#ff4da6'];

        function explotar(cx, cy) {
            const pts = corazonPuntos(11);
            pts.forEach(p => {
                const vx = p.x * 0.18, vy = p.y * 0.18;
                const c = colores[Math.floor(Math.random() * colores.length)];
                particulas.push(new Particle(cx, cy, vx, vy, c, false));
                particulas.push(new Particle(cx, cy, vx * .7, vy * .7, c, true));
                particulas.push(new Particle(cx, cy, vx * 1.3, vy * 1.3, '#fff', false));
            });
            for (let i = 0; i < 40; i++) {
                const a = Math.random() * Math.PI * 2, sp = Math.random() * 5 + 1;
                const c = colores[Math.floor(Math.random() * colores.length)];
                particulas.push(new Particle(cx, cy, Math.cos(a) * sp, Math.sin(a) * sp, c, false));
            }
            const m = mensajes[msgIdx % mensajes.length]; msgIdx++;
            textoTitulo.textContent = m.t; textoSub.textContent = m.s;
            textoContainer.style.left = cx + 'px'; textoContainer.style.top = cy + 'px';
            textoContainer.classList.add('mostrar');
            sparkles(cx, cy); floatMsg(cx, cy);
            setTimeout(() => textoContainer.classList.remove('mostrar'), 3000);
        }

        const sparkEmoji = ['\u2728', '\uD83D\uDCAB', '\u2B50', '\uD83C\uDF1F', '\uD83D\uDCA5', '\uD83D\uDC96'];
        function sparkles(cx, cy) {
            for (let i = 0; i < 8; i++) {
                const el = document.createElement('div'); el.className = 'sparkle';
                el.textContent = sparkEmoji[Math.floor(Math.random() * sparkEmoji.length)];
                const a = Math.random() * Math.PI * 2, d = Math.random() * 100 + 40;
                el.style.left = (cx + Math.cos(a) * d) + 'px'; el.style.top = (cy + Math.sin(a) * d) + 'px';
                el.style.fontSize = (Math.random() * 1.2 + 0.7) + 'rem';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2100);
            }
        }

        const frases = ['\uD83D\uDC96 Te amo', '\uD83D\uDC51 Mi reina', '\u2728 Eres perfecta', '\uD83C\uDF39 Amor eterno', '\uD83D\uDC95 Para siempre', '\uD83E\uDD8B Mi mariposa', '\uD83C\uDF1F Mi luz', '\uD83D\uDC8E Mi tesoro', '\uD83C\uDF38 Mi flor'];
        function floatMsg(cx, cy) {
            const el = document.createElement('div'); el.className = 'love-message';
            el.textContent = frases[Math.floor(Math.random() * frases.length)];
            el.style.left = (cx + (Math.random() - .5) * 160) + 'px'; el.style.top = (cy - 30) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5100);
        }

        const hContainer = document.getElementById('floatingHeartsContainer');
        const hEmojis = ['\uD83D\uDC96', '\uD83D\uDC97', '\uD83D\uDC93', '\uD83D\uDC95', '\uD83D\uDC9E', '\uD83D\uDC9D', '\u2764\uFE0F', '\uD83E\uDEB7', '\uD83D\uDC98'];
        function addHeart() {
            const el = document.createElement('div'); el.className = 'heart-float';
            el.textContent = hEmojis[Math.floor(Math.random() * hEmojis.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 1.8 + 0.7) + 'rem';
            const dur = Math.random() * 10 + 8;
            el.style.animationDuration = dur + 's'; el.style.animationDelay = (Math.random() * 3) + 's';
            el.style.filter = 'drop-shadow(0 0 ' + (Math.random() * 6 + 4) + 'px #ff007f)';
            hContainer.appendChild(el);
            setTimeout(() => el.remove(), (dur + 4) * 1000);
        }
        for (let i = 0; i < 18; i++) setTimeout(addHeart, Math.random() * 5000);
        setInterval(addHeart, 700);

        // Click para PC
        window.addEventListener('click', (e) => {
            iniciarAudio();
            cohetes.push(new Cohete(e.clientX + (Math.random() - .5) * 60, window.innerHeight, e.clientX, e.clientY));
        });
        // Touch para móvil (sin retardo de 300ms)
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            iniciarAudio();
            const t = e.changedTouches[0];
            cohetes.push(new Cohete(t.clientX + (Math.random() - .5) * 60, window.innerHeight, t.clientX, t.clientY));
        }, { passive: false });

        // Cohetes automáticos (silenciosos para no molestar)
        setInterval(() => {
            const x = Math.random() * canvas.width;
            const tx = x + (Math.random() - .5) * 200;
            const ty = Math.random() * canvas.height * 0.6 + 60;
            cohetes.push(new Cohete(x, canvas.height, tx, ty, true)); // silent=true
        }, 4000);

        let bgPhase = 0;
        function drawBgHeart() {
            bgPhase += 0.03;
            const s = Math.min(canvas.width, canvas.height) * 0.022 * (1 + Math.sin(bgPhase * 2) * 0.05);
            const pts = corazonPuntos(s), cx = canvas.width / 2, cy = canvas.height / 2;
            ctx.beginPath();
            pts.forEach((p, i) => { if (i === 0) ctx.moveTo(cx + p.x, cy + p.y); else ctx.lineTo(cx + p.x, cy + p.y); });
            ctx.closePath();
            ctx.strokeStyle = 'rgba(255,0,127,0.06)'; ctx.lineWidth = 1.5;
            ctx.shadowBlur = 15; ctx.shadowColor = '#ff007f'; ctx.stroke(); ctx.shadowBlur = 0;
        }

        function loop() {
            ctx.fillStyle = 'rgba(12,2,20,0.22)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawBgHeart();
            estrellas.forEach(s => {
                s.fase += s.vel;
                const op = (Math.sin(s.fase) + 1) / 2 * 0.8 + 0.1;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,220,240,' + op + ')';
                if (s.r > 1) { ctx.shadowBlur = 4; ctx.shadowColor = '#ff99cc'; }
                ctx.fill(); ctx.shadowBlur = 0;
            });
            fugaces.forEach(f => { f.update(); f.draw(); });
            cohetes = cohetes.filter(c => !c.dead);
            cohetes.forEach(c => { c.update(); c.draw(); });
            particulas = particulas.filter(p => p.alpha > 0);
            particulas.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>

</html>
